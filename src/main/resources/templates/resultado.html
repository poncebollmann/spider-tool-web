<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Resultado — SPIDER Protocol Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f5f5f5;
    }
    h1 { color: #1565C0; border-bottom: 2px solid #1565C0; padding-bottom: 10px; }
    h2 { color: #263238; font-size: 16px; margin-top: 30px; }
    .cadena {
      background: white;
      border-left: 4px solid #2E7D32;
      padding: 16px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
      word-break: break-word;
      margin: 10px 0 24px 0;
    }
    .componentes {
      background: white;
      padding: 16px;
      border-radius: 6px;
      border-left: 4px solid #1565C0;
      margin-bottom: 24px;
    }
    .componente-fila {
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .componente-fila:last-child { border-bottom: none; }
    .letra {
      font-weight: bold;
      color: #1565C0;
      display: inline-block;
      width: 30px;
    }
    .botones { margin-top: 20px; }
    a.boton {
      display: inline-block;
      background-color: #1565C0;
      color: white;
      padding: 10px 22px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
      margin-right: 10px;
    }
    a.boton-secondary {
      background-color: #607D8B;
    }
    a.boton:hover { opacity: 0.9; }
  </style>
</head>
<body>

<h1>Resultado de búsqueda</h1>

<h2>Componentes introducidos</h2>
<div class="componentes">
  <div class="componente-fila">
    <span class="letra">[S]</span>
    <span th:text="${searchRequest.sample}">—</span>
  </div>
  <div class="componente-fila">
    <span class="letra">[P]</span>
    <span th:text="${searchRequest.phenomenon}">—</span>
  </div>
  <div class="componente-fila">
    <span class="letra">[I]</span>
    <span th:text="${searchRequest.design}">—</span>
  </div>
  <div class="componente-fila">
    <span class="letra">[D]</span>
    <span th:text="${searchRequest.evaluation}">—</span>
  </div>
  <div class="componente-fila">
    <span class="letra">[E]</span>
    <span th:text="${searchRequest.researchType}">—</span>
  </div>
  <div class="componente-fila" th:if="${searchRequest.research != null and !#strings.isEmpty(searchRequest.research)}">
    <span class="letra">[R]</span>
    <span th:text="${searchRequest.research}">—</span>
  </div>
</div>

<h2>Cadena de búsqueda booleana</h2>
<div class="cadena" th:text="${cadena}"></div>

<div class="botones">
  <a href="/" class="boton">← Nueva búsqueda</a>
  <a href="/" class="boton boton-secondary">Inicio</a>
</div>

</body>
</html>
